name: Publish Docker image to GHCR

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'Dockerfile'
      - 'package*.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yuens1002/bookie-mcp
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ] && [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$RAILWAY_SERVICE_ID" ]; then
            npm install -g @railway/cli@5.23.3
            railway redeploy --service "$RAILWAY_SERVICE_ID" --yes
            echo "Railway redeploy triggered."
          else
            echo "RAILWAY_TOKEN, RAILWAY_PROJECT_ID, or RAILWAY_SERVICE_ID not set — skipping Railway redeploy."
          fi
